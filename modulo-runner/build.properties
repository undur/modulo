principalClass=modulo.runner.Application
project.name=modulo-runner
project.type=application

# JVM options merged into the launcher script alongside the WO-required
# --add-opens / --add-exports flags vermilingua adds automatically.
#
# --enable-native-access=ALL-UNNAMED is required when the HTTP/3 front-end
# is enabled (modulo.frontend.http3=true). Jetty's Quiche foreign-memory
# backend uses java.lang.foreign which JDK 22+ warns about and JDK 26+
# blocks unless native access is granted. Leaving it on unconditionally
# is harmless when H/3 is disabled.
jvmOptions=--enable-native-access=ALL-UNNAMED